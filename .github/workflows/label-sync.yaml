name: Label Sync

on:
  push:
    branches:
      - main
    paths:
      - .github/label-definitions.yaml
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Sync labels
        uses: EndBug/label-sync@v2
        with:
          config-file: .github/label-definitions.yaml
          delete-other-labels: true
